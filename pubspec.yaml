name: app_aryoria
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  animate_do: ^5.1.0
  card_swiper: ^3.0.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.3.1
  fluttertoast: ^9.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.3
  injectable: ^3.0.0
  provider: ^6.1.5+1
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.5.5
  socket_io_client: ^3.1.6

